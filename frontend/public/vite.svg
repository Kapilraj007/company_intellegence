<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- IntelIQ Logo: Orange Q with gradient -->
  <defs>
    <linearGradient id="iqGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Q shape -->
  <g transform="translate(50, 50)">
    <!-- Q circle body -->
    <circle cx="0" cy="0" r="28" fill="url(#iqGradient)" stroke="#ff5500" stroke-width="1.5"/>
    
    <!-- Q inner white space -->
    <circle cx="0" cy="0" r="18" fill="#ffffff" opacity="0.15"/>
    
    <!-- Q tail -->
    <path d="M 12 12 Q 20 18 22 28" fill="none" stroke="url(#iqGradient)" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Highlight for 3D effect -->
    <ellipse cx="-10" cy="-12" rx="8" ry="6" fill="#ffffff" opacity="0.3"/>
  </g>
</svg>