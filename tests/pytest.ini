[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# CRITICAL: tells pytest to add project root to sys.path so `from core.models import` works
pythonpath = .

markers =
    unit: Pure unit tests
    integration: Integration tests
    live: Tests against fresh pipeline output
    critical: Must pass before merge
    section_12_5: Risk Classification
    section_13_2: Response Time
    section_13_3: Token Limit Handling
    section_13_4: Memory Independence
    section_14_1: Null / Unavailable Data
    section_14_2: Not Applicable Fields

addopts =
    --tb=short
    --strict-markers